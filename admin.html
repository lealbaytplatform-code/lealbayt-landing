<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لي البيت — لوحة التحكم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --white:      #FFFFFF;
      --gray-50:    #F9FAFB;
      --gray-100:   #F3F4F6;
      --gray-200:   #E5E7EB;
      --gray-300:   #D1D5DB;
      --gray-400:   #9CA3AF;
      --gray-500:   #6B7280;
      --gray-600:   #4B5563;
      --gray-700:   #374151;
      --gray-800:   #1F2937;
      --success:    #2D9E6B;
      --error:      #DC2626;
      --warning:    #D97706;
      --radius-sm:  10px;
      --radius:     16px;
      --shadow-sm:  0 1px 8px rgba(0,0,0,0.05);
      --shadow:     0 4px 24px rgba(0,0,0,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--gray-100);
      color: var(--gray-600);
      min-height: 100vh;
    }

    /* ── Login ──────────────────────────────────────── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .login-logo {
      width: 64px; height: 64px;
      background: var(--gray-100);
      border-radius: 16px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 22px;
      color: var(--gray-500);
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--gray-700);
      margin-bottom: 4px;
    }
    .login-card .subtitle {
      font-size: 13px;
      color: var(--gray-400);
      margin-bottom: 28px;
    }
    .login-card input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      background: var(--gray-50);
      color: var(--gray-700);
      outline: none;
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 1px;
    }
    .login-card input:focus {
      border-color: var(--gray-500);
      background: white;
    }
    .login-card button {
      width: 100%;
      padding: 13px;
      background: var(--gray-700);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-card button:hover { background: var(--gray-800); }
    .login-card button:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      color: var(--error);
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    /* ── Dashboard ──────────────────────────────────── */
    .dash { display: none; }
    .topbar {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar .brand {
      font-size: 20px;
      font-weight: 900;
      color: var(--gray-700);
    }
    .topbar .brand span {
      font-size: 12px;
      font-weight: 400;
      color: var(--gray-400);
      letter-spacing: 2px;
      margin-right: 8px;
    }
    .logout-btn {
      background: var(--gray-100);
      color: var(--gray-600);
      border: 1px solid var(--gray-200);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px;
    }

    /* Stats grid */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-100);
    }
    .stat-card .label {
      font-size: 12px;
      color: var(--gray-400);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 900;
      color: var(--gray-700);
    }
    .stat-card.success .value { color: var(--success); }
    .stat-card.warning .value { color: var(--warning); }
    .stat-card.error .value { color: var(--error); }

    /* Tabs */
    .tabs {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .tabs-nav {
      display: flex;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 12px;
      overflow-x: auto;
    }
    .tab-btn {
      padding: 14px 20px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-400);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: var(--gray-700);
      border-bottom-color: var(--gray-700);
    }
    .tab-content {
      padding: 24px;
      min-height: 400px;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .toolbar input,
    .toolbar select {
      padding: 9px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      color: var(--gray-700);
      background: var(--gray-50);
      outline: none;
    }
    .toolbar input { flex: 1; min-width: 220px; }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--gray-500); background: white; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: right;
      padding: 12px 14px;
      background: var(--gray-50);
      font-weight: 700;
      color: var(--gray-500);
      font-size: 12px;
      border-bottom: 1px solid var(--gray-200);
      white-space: nowrap;
    }
    td {
      padding: 14px;
      border-bottom: 1px solid var(--gray-100);
      color: var(--gray-700);
    }
    tr:hover td { background: var(--gray-50); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge.active    { background: rgba(45,158,107,0.10); color: var(--success); }
    .badge.pending   { background: rgba(217,119,6,0.10);  color: var(--warning); }
    .badge.suspended { background: rgba(220,38,38,0.10);  color: var(--error); }
    .badge.expired   { background: var(--gray-100); color: var(--gray-500); }

    .actions-cell { display: flex; gap: 6px; }
    .icon-btn {
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      padding: 5px 10px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      color: var(--gray-600);
      transition: all 0.15s;
    }
    .icon-btn:hover { background: var(--gray-200); }
    .icon-btn.activate:hover  { background: rgba(45,158,107,0.10);  color: var(--success); border-color: var(--success); }
    .icon-btn.suspend:hover   { background: rgba(220,38,38,0.10);   color: var(--error);   border-color: var(--error); }
    .icon-btn.extend:hover    { background: rgba(28,28,30,0.05);    color: var(--gray-800); border-color: var(--gray-500); }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-400);
      font-size: 14px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--gray-400);
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gray-800);
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--error); }
    .toast.success { background: var(--success); }

    @media (max-width: 700px) {
      .container { padding: 16px; }
      .topbar { padding: 14px 16px; }
      .tab-content { padding: 16px; }
      th, td { padding: 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-wrap" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">LB</div>
      <h1>لوحة التحكم</h1>
      <p class="subtitle">لي البيت — Le AlBayt</p>
      <input type="password" id="adminKey" placeholder="كلمة المرور" autofocus />
      <button onclick="login()" id="loginBtn">دخول</button>
      <div class="login-error" id="loginErr">كلمة المرور غير صحيحة</div>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dash" id="dashboard">
    <div class="topbar">
      <div class="brand">لي البيت <span>ADMIN</span></div>
      <button class="logout-btn" onclick="logout()">خروج</button>
    </div>

    <div class="container">
      <!-- Stats -->
      <div class="stats" id="statsGrid">
        <div class="loading">جاري التحميل...</div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <div class="tabs-nav">
          <button class="tab-btn active" data-tab="providers">مقدمو الخدمة</button>
          <button class="tab-btn" data-tab="subscriptions">الاشتراكات</button>
          <button class="tab-btn" data-tab="payments">المدفوعات</button>
        </div>

        <div class="tab-content">
          <!-- Providers -->
          <div class="tab-pane active" id="tab-providers">
            <div class="toolbar">
              <input type="text" id="searchProviders" placeholder="بحث بالاسم أو الواتساب..." oninput="loadProviders()" />
              <select id="filterStatus" onchange="loadProviders()">
                <option value="">كل الحالات</option>
                <option value="active">مفعّل</option>
                <option value="pending">قيد المراجعة</option>
                <option value="suspended">موقوف</option>
                <option value="expired">منتهي</option>
              </select>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>الاسم</th>
                    <th>المالك</th>
                    <th>الواتساب</th>
                    <th>القطاع</th>
                    <th>المنطقة</th>
                    <th>الحالة</th>
                    <th>تاريخ التسجيل</th>
                    <th>إجراءات</th>
                  </tr>
                </thead>
                <tbody id="providersBody">
                  <tr><td colspan="8" class="loading">جاري التحميل...</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Subscriptions -->
          <div class="tab-pane" id="tab-subscriptions">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>المزود</th>
                    <th>الباقة</th>
                    <th>السعر</th>
                    <th>البداية</th>
                    <th>النهاية</th>
                    <th>الحالة</th>
                  </tr>
                </thead>
                <tbody id="subsBody">
                  <tr><td colspan="6" class="loading">جاري التحميل...</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Payments -->
          <div class="tab-pane" id="tab-payments">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>المزود</th>
                    <th>المبلغ</th>
                    <th>الوصف</th>
                    <th>القناة</th>
                    <th>الحالة</th>
                    <th>التاريخ</th>
                  </tr>
                </thead>
                <tbody id="paymentsBody">
                  <tr><td colspan="6" class="loading">جاري التحميل...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const API_URL = 'https://efyluvxcjchynqzytqrf.supabase.co/functions/v1/admin-api';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmeWx1dnhjamNoeW5xenl0cXJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTg5NjUsImV4cCI6MjA5NDI3NDk2NX0.GisojutOM_VYqatjK8GUxvXO31urFlx9kTW1qriLmQI';

  let adminKey = sessionStorage.getItem('admin_key') || '';

  async function api(action, params = {}) {
    const res = await fetch(API_URL, {
      method:  'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'x-admin-key':   adminKey,
      },
      body: JSON.stringify({ action, ...params }),
    });
    if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
    return res.json();
  }

  async function login() {
    const key = document.getElementById('adminKey').value.trim();
    if (!key) return;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '...';
    adminKey = key;
    try {
      const r = await api('stats');
      if (r.error) throw new Error(r.error);
      sessionStorage.setItem('admin_key', key);
      showDash();
    } catch (e) {
      document.getElementById('loginErr').style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'دخول';
      adminKey = '';
    }
  }

  function logout() {
    sessionStorage.removeItem('admin_key');
    adminKey = '';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display   = 'none';
    document.getElementById('adminKey').value = '';
  }

  function showDash() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display   = 'block';
    loadStats();
    loadProviders();
    loadSubs();
    loadPayments();
  }

  // ── Stats ────────────────────────────────────────────────
  async function loadStats() {
    const r = await api('stats');
    const s = r.stats || {};
    const cards = [
      { label: 'مفعّلون',          value: s.active_count        ?? 0, cls: 'success' },
      { label: 'قيد المراجعة',     value: s.new_today           ?? 0, cls: 'warning' },
      { label: 'منتهية',           value: s.expired_count       ?? 0, cls: 'error' },
      { label: 'تنتهي خلال 3 أيام', value: s.expiring_3_days     ?? 0, cls: 'warning' },
      { label: 'محادثات اليوم',    value: s.conversations_today ?? 0, cls: '' },
      { label: 'إيرادات اليوم',    value: (s.revenue_today  ?? 0) + ' د.ك', cls: 'success' },
      { label: 'إيرادات الشهر',    value: (s.revenue_month  ?? 0) + ' د.ك', cls: 'success' },
    ];
    document.getElementById('statsGrid').innerHTML = cards.map(c =>
      `<div class="stat-card ${c.cls}">
         <div class="label">${c.label}</div>
         <div class="value">${c.value}</div>
       </div>`
    ).join('');
  }

  // ── Providers ────────────────────────────────────────────
  async function loadProviders() {
    const search = document.getElementById('searchProviders').value.trim();
    const status = document.getElementById('filterStatus').value;
    const r = await api('list_providers', { search, status });
    const rows = (r.providers || []);
    if (rows.length === 0) {
      document.getElementById('providersBody').innerHTML =
        '<tr><td colspan="8" class="empty">لا توجد نتائج</td></tr>';
      return;
    }
    document.getElementById('providersBody').innerHTML = rows.map(p => {
      const sectorName = p.sectors?.name_ar ?? '—';
      const date = new Date(p.created_at).toLocaleDateString('ar-KW');
      return `
        <tr>
          <td><strong>${esc(p.name)}</strong></td>
          <td>${esc(p.owner_name || '—')}</td>
          <td dir="ltr">${esc(p.whatsapp)}</td>
          <td>${esc(sectorName)}</td>
          <td>${esc(p.area || '—')}</td>
          <td><span class="badge ${p.status}">${statusLabel(p.status)}</span></td>
          <td>${date}</td>
          <td class="actions-cell">
            ${p.status !== 'active'    ? `<button class="icon-btn activate" onclick="setStatus(${p.id}, 'active')">تفعيل</button>` : ''}
            ${p.status !== 'suspended' ? `<button class="icon-btn suspend"  onclick="setStatus(${p.id}, 'suspended')">إيقاف</button>` : ''}
            <button class="icon-btn extend" onclick="extend(${p.id})">+30 يوم</button>
          </td>
        </tr>`;
    }).join('');
  }

  async function setStatus(id, status) {
    const r = await api('update_provider_status', { provider_id: id, status });
    if (r.error) return toast(r.error, 'error');
    toast('تم التحديث', 'success');
    loadProviders();
    loadStats();
  }

  async function extend(id) {
    if (!confirm('تمديد الاشتراك 30 يوم؟')) return;
    const r = await api('extend_subscription', { provider_id: id, days: 30 });
    if (r.error) return toast(r.error, 'error');
    toast(r.message || 'تم التمديد', 'success');
    loadProviders();
    loadSubs();
  }

  // ── Subscriptions ────────────────────────────────────────
  async function loadSubs() {
    const r = await api('list_subscriptions');
    const rows = r.subscriptions || [];
    if (rows.length === 0) {
      document.getElementById('subsBody').innerHTML =
        '<tr><td colspan="6" class="empty">لا توجد اشتراكات</td></tr>';
      return;
    }
    document.getElementById('subsBody').innerHTML = rows.map(s => `
      <tr>
        <td><strong>${esc(s.providers?.name || '—')}</strong></td>
        <td>${esc(s.subscription_plans?.name_ar || '—')}</td>
        <td>${s.subscription_plans?.price ?? 0} د.ك</td>
        <td>${s.start_date}</td>
        <td>${s.end_date}</td>
        <td><span class="badge ${s.status}">${statusLabel(s.status)}</span></td>
      </tr>`).join('');
  }

  // ── Payments ─────────────────────────────────────────────
  async function loadPayments() {
    const r = await api('list_payments');
    const rows = r.payments || [];
    if (rows.length === 0) {
      document.getElementById('paymentsBody').innerHTML =
        '<tr><td colspan="6" class="empty">لا توجد مدفوعات</td></tr>';
      return;
    }
    document.getElementById('paymentsBody').innerHTML = rows.map(p => `
      <tr>
        <td><strong>${esc(p.providers?.name || '—')}</strong></td>
        <td>${p.amount} ${p.currency || 'KWD'}</td>
        <td>${esc(p.description || '—')}</td>
        <td>${esc(p.gateway || '—')}</td>
        <td><span class="badge ${p.status === 'success' ? 'active' : 'pending'}">${p.status}</span></td>
        <td>${new Date(p.created_at).toLocaleDateString('ar-KW')}</td>
      </tr>`).join('');
  }

  // ── Helpers ──────────────────────────────────────────────
  function statusLabel(s) {
    return { active:'مفعّل', pending:'قيد المراجعة', suspended:'موقوف', expired:'منتهي', success:'ناجح' }[s] || s;
  }
  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  function toast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.className = 'toast', 2500);
  }

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  document.getElementById('adminKey').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
  });

  // Auto-login if key exists
  if (adminKey) {
    api('stats').then(r => {
      if (!r.error) showDash();
      else logout();
    }).catch(() => logout());
  }
</script>
</body>
</html>
